# ~/.config/tmux/tmux.conf
#
# Dias tmux workflow. Keep this intentionally different from Omarchy defaults:
# - prefix is C-s
# - splits are prefix + | and prefix + -
# - h/j/k/l move panes, H/J/K/L resize panes
# - theme is generated dynamically from the active Omarchy theme

##### Prefix
unbind C-b
set -g prefix C-s
set -g prefix2 None
bind C-s send-prefix
bind C-b send-prefix

##### Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf recarregado"
bind -n C-q source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf recarregado"

##### Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

##### Pane controls
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind z resize-pane -Z
bind & confirm-before -p "Fechar janela #W? (y/n)" kill-window

##### Pane navigation with arrows (sem prefixo)
bind -n C-M-Left  select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up    select-pane -U
bind -n C-M-Down  select-pane -D

##### Resize panes with arrows (sem prefixo)
bind -n C-M-S-Left  resize-pane -L 5
bind -n C-M-S-Down  resize-pane -D 5
bind -n C-M-S-Up    resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

##### Window controls
bind c new-window -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind K confirm-before -p "Fechar janela #W? (y/n)" kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left  select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left  swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

##### Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind X confirm-before -p "Fechar sessão #S? (y/n)" kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-Up   switch-client -p
bind -n M-Down switch-client -n

##### Sesh
bind S display-popup -E -w 80% -h 70% 'SESH_FZF_HEIGHT=100% sesh-session'

##### General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'ghostty*:extkeys'
bind -n S-Enter send-keys "\033[13;2u"

set -g mouse on
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

##### Status bar
set -g status-position top
set -g status-interval 5
set -g status-justify absolute-centre
set -g status-left-length 30
set -g status-right-length 40
set -g window-status-separator ""

##### Theme - Omarchy dynamic
# Generated from ~/.config/omarchy/current/theme/colors.toml by tmux-omarchy-theme.
# The theme-set hook regenerates/reloads this file when Omarchy themes change.
source-file -q ~/.config/tmux/omarchy-theme.conf
run-shell -b 'tmux-omarchy-theme'
