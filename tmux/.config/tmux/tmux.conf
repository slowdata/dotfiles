# ~/.config/tmux/tmux.conf

##### Prefix
unbind C-b
set -g prefix C-s
set -g prefix2 C-b
bind C-s send-prefix
bind C-b send-prefix

##### Reload config
bind q source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf recarregado"

##### Copy mode (vi)
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

##### Pane controls
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

bind - split-window -v -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"

bind z resize-pane -Z
bind & confirm-before -p "Fechar janela #W? (y/n)" kill-window

##### Pane navigation with arrows (sem prefixo)
bind -n C-M-Left  select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up    select-pane -U
bind -n C-M-Down  select-pane -D

##### Resize panes with arrows (sem prefixo)
bind -n C-M-S-Left  resize-pane -L 5
bind -n C-M-S-Down  resize-pane -D 5
bind -n C-M-S-Up    resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

##### Window controls
bind c new-window -c "#{pane_current_path}"
bind r command-prompt -I "#W" "rename-window -- '%%'"
bind K confirm-before -p "Fechar janela #W? (y/n)" kill-window

bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left  select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left  swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1

##### Session controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind X confirm-before -p "Fechar sessão #S? (y/n)" kill-session
bind P switch-client -p
bind N switch-client -n
bind -n M-Up   switch-client -p
bind -n M-Down switch-client -n

##### General
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'ghostty*:extkeys'
bind -n S-Enter send-keys "\033[13;2u"

set -g mouse on
set -g base-index 0
setw -g pane-base-index 0
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0
set -g focus-events on
set -g set-clipboard on
set -g allow-passthrough on
setw -g aggressive-resize on
set -g detach-on-destroy off

##### Status bar
set -g status-position top
set -g status-interval 5
set -g status-justify absolute-centre
set -g status-left-length 30
set -g status-right-length 40
set -g window-status-separator ""

##### Theme - Flexoki Light (Omarchy)
# Palette from ~/.config/omarchy/current/theme/colors.toml
flexoki_bg="#FFFCF0"
flexoki_fg="#100F0F"
flexoki_muted="#CECDC3"
flexoki_subtle="#B7B5AC"
flexoki_blue="#205EA6"
flexoki_blue_bright="#4385BE"
flexoki_red="#D14D41"
flexoki_yellow="#D0A215"
flexoki_green="#879A39"
flexoki_cyan="#3AA99F"

set -g status-style "bg=${flexoki_bg},fg=${flexoki_fg}"
set -g message-style "bg=${flexoki_muted},fg=${flexoki_fg}"
set -g message-command-style "bg=${flexoki_muted},fg=${flexoki_fg}"
set -g mode-style "bg=${flexoki_blue},fg=${flexoki_bg},bold"

set -g pane-border-style "fg=${flexoki_muted}"
set -g pane-active-border-style "fg=${flexoki_blue}"
set -g display-panes-colour "${flexoki_muted}"
set -g display-panes-active-colour "${flexoki_blue}"

set -g window-status-style "bg=${flexoki_bg},fg=${flexoki_subtle}"
set -g window-status-format " #[fg=${flexoki_subtle}]#I #[fg=${flexoki_fg}]#W "
set -g window-status-current-style "bg=${flexoki_muted},fg=${flexoki_fg},bold"
# Active window name often equals pane_current_command, so keep it compact and
# let the right-side app module carry the active program name.
set -g window-status-current-format " #[bg=${flexoki_fg},fg=${flexoki_bg},bold] #I #[default]"
set -g window-status-bell-style "bg=${flexoki_yellow},fg=${flexoki_fg},bold"
set -g window-status-activity-style "bg=${flexoki_bg},fg=${flexoki_blue}"

set -g status-left-style "bg=${flexoki_blue},fg=${flexoki_bg},bold"
set -g status-left " #S "
set -g status-right-style "bg=${flexoki_bg},fg=${flexoki_fg}"

# Flat Flexoki modules: squared blocks rather than rounded Catppuccin caps.
# Useful signal only: transient tmux states, active program, and host.
set -g @flexoki_status_copy "#[fg=${flexoki_bg},bg=${flexoki_cyan},bold] COPY #[fg=${flexoki_fg},bg=${flexoki_muted}] mode "
set -g @flexoki_status_prefix "#[fg=${flexoki_bg},bg=${flexoki_red},bold] PREFIX #[fg=${flexoki_fg},bg=${flexoki_muted}] on "
set -g @flexoki_status_zoom "#[fg=${flexoki_fg},bg=${flexoki_yellow},bold] ZOOM #[fg=${flexoki_fg},bg=${flexoki_muted}] pane "
set -g @flexoki_status_app "#[fg=${flexoki_bg},bg=${flexoki_green},bold]  #[fg=${flexoki_fg},bg=${flexoki_muted}] #{pane_current_command} "
set -g @flexoki_status_host "#[fg=${flexoki_bg},bg=${flexoki_blue},bold] 󰒋 #[fg=${flexoki_fg},bg=${flexoki_muted}] #H "
set -g status-right "#{?pane_in_mode,#{E:@flexoki_status_copy},}#{?client_prefix,#{E:@flexoki_status_prefix},}#{?window_zoomed_flag,#{E:@flexoki_status_zoom},}#{E:@flexoki_status_app}#{E:@flexoki_status_host}"

# tmux status-format controls layout. Keep alignment/fill separate from styles:
# - putting #{E:status-left-style} outside #[...] prints "bg=#..." as text
# - putting it inside the align block breaks the right alignment on tmux 3.6
set -g status-format[0] "#[align=left fill=${flexoki_bg}]#[bg=${flexoki_blue},fg=${flexoki_bg},bold]#{T;=/#{status-left-length}:status-left}#[default]#{W:#{E:window-status-format},#{E:window-status-current-format}}#[align=right fill=${flexoki_bg}]#{T;=/#{status-right-length}:status-right}"
