[main]
# Omarchy theme colors are passed per window by ~/.local/bin/dotfiles-terminal.
# Do not include ~/.config/omarchy/current/theme/foot.ini here: it may not exist
# until the current theme is regenerated, and foot-server reads config only once.

# Use Foot's own terminfo so local tools can detect capabilities such as sixel.
# For old remote hosts without foot terminfo, use: TERM=xterm-256color ssh host
term=foot
font=JetBrainsMono Nerd Font:size=9
pad=14x14
initial-window-mode=windowed

# 0 disables render worker threads; 4 is a good cross-machine default.
workers=4

[environment]
FOOT_TERMINAL=1
TERM_PROGRAM=foot
COLORTERM=truecolor

[security]
# Let remote apps copy to the host clipboard via OSC-52, but do not let them
# read/paste from it.
osc52=copy-enabled

[scrollback]
lines=10000
# Rolar 3 linhas por "tick" e mostrar indicador de posição ao rolar.
multiplier=3.0
indicator-position=relative
indicator-format=line

[cursor]
style=block
blink=no

[mouse]
# Esconde o ponteiro enquanto escreves (reaparece ao mexer).
hide-when-typing=yes

[key-bindings]
clipboard-copy=Control+Insert Control+Shift+c XF86Copy
primary-paste=none
clipboard-paste=Shift+Insert Control+Shift+v XF86Paste
show-urls-launch=Control+Shift+o
show-urls-copy=Control+Alt+Shift+o
pipe-command-output=[wl-copy] Control+Shift+g
prompt-prev=Control+Shift+z
prompt-next=Control+Shift+x
