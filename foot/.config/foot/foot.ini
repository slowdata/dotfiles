[main]
include=~/.config/omarchy/current/theme/foot.ini

# Keep xterm-256color for broad SSH compatibility. We identify foot via
# FOOT_TERMINAL below for local shell integration.
term=xterm-256color
font=JetBrainsMono Nerd Font:size=9
pad=14x14
initial-window-mode=windowed

# 0 disables render worker threads; 4 is a good cross-machine default.
workers=4

[environment]
FOOT_TERMINAL=1

[security]
# Let remote apps copy to the host clipboard via OSC-52, but do not let them
# read/paste from it.
osc52=copy-enabled

[scrollback]
lines=10000

[cursor]
style=block
blink=no

[key-bindings]
clipboard-copy=Control+Insert Control+Shift+c XF86Copy
primary-paste=none
clipboard-paste=Shift+Insert Control+Shift+v XF86Paste
show-urls-launch=Control+Shift+o
show-urls-copy=Control+Alt+Shift+o
pipe-command-output=[wl-copy] Control+Shift+g
prompt-prev=Control+Shift+z
prompt-next=Control+Shift+x
